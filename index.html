<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance - Sekartaji Fishery System</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f4c75 0%, #3282b8 100%);
            --accent-color: #00ffcc; /* Cyan Cerah */
            --text-white: #ffffff;
            --soft-blue: #bbe1fa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            align-items: center;
            gap: 50px;
        }

        .content {
            animation: fadeIn 1s ease-out;
        }

        .badge {
            background: rgba(0, 255, 204, 0.15);
            color: var(--accent-color);
            padding: 6px 15px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: inline-block;
            margin-bottom: 20px;
            border: 1px solid var(--accent-color);
        }

        h1 {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 15px;
            background: linear-gradient(to bottom, #ffffff, #bbe1fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            font-weight: 400;
            color: var(--soft-blue);
            margin-bottom: 40px;
        }

        .image-container {
            position: relative;
            display: flex;
            justify-content: center;
            animation: float 5s ease-in-out infinite;
        }

        .main-img {
            width: 100%;
            max-width: 550px;
            height: auto;
            /* Efek bayangan lembut */
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.3));
        }

        /* Progress Bar */
        .loader-wrapper {
            width: 100%;
            max-width: 450px;
        }

        .bar-bg {
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            width: 0%;
            background: var(--accent-color);
            box-shadow: 0 0 15px var(--accent-color);
            border-radius: 20px;
            transition: width 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-25px); }
        }

        /* Responsive Layout */
        @media (max-width: 968px) {
            .container {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .content {
                order: 2;
            }
            .image-container {
                order: 1;
            }
            .loader-wrapper {
                margin: 0 auto;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="content">
            <div class="badge">DWI KARYA INOVASI</div>
            <h1>Hallo, M. Fachriza</h1>
            <h2>Sekartaji Fishery System Akan Segera Hadir Untukmu</h2>
            
            <div class="loader-wrapper">
                <div class="bar-bg">
                    <div class="bar-fill" id="progressFill"></div>
                </div>
                <p id="percent" style="margin-top: 15px; font-weight: bold; color: var(--accent-color);">0%</p>
            </div>
        </div>

        <div class="image-container">
            <img src="https://cdni.iconscout.com/illustration/premium/thumb/fish-farming-illustration-download-in-svg-png-gif-file-formats--fisherman-industry-farm-pack-business-illustrations-4545040.png" alt="Fishery System" class="main-img">
        </div>
    </div>

    <script>
        // Animasi angka dan progress bar
        const fill = document.getElementById('progressFill');
        const text = document.getElementById('percent');
        let width = 0;

        const interval = setInterval(() => {
            if (width >= 92) {
                clearInterval(interval);
                text.innerText = "Sistem sedang disiapkan 7-14 hari kedepan... 92%";
            } else {
                width++;
                fill.style.width = width + '%';
                text.innerText = "mencoba membuka... " + width + '%';
            }
        }, 60);
    </script>
</body>
</html>
